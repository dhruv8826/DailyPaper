name: Check API Quotas
on: workflow_dispatch # Manual trigger only

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install SDK
        run: pip install -U google-genai # Force latest version
      - name: Run Diagnosis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python check_models.py
