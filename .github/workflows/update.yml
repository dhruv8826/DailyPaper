name: Hourly News Ecosystem
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: news-update
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Kolkata  # This sets the server's local time to IST
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install --upgrade google-genai
      - name: Run Logic
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python update_news.py
      - name: Commit & Push Changes
        run: |
          git config --global user.name 'NewsBot'
          git config --global user.email 'bot@github.com'
          git add *.html data.json
          git commit -m "Update Newspaper: $(date)" || echo "No changes"
          git push
